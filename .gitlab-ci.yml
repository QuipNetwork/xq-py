stages:
  - lint
  - test

lint:
  stage: lint
  image: python:3.13-slim
  before_script:
    - pip install ruff
  script:
    - ruff check .
    - ruff format --check .

test:
  stage: test
  image: python:3.13-slim
  before_script:
    - pip install -r requirements.txt
  script:
    - python -m pytest tests/ -v
